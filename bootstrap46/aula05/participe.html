<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Fã Clube - FalleN (O Professor)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; }
        main { flex: 1; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <a class="navbar-brand font-weight-bold" href="index.html">
            <i class="fas fa-crosshairs text-warning mr-2"></i>FalleN Club
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="carreira.html">Carreira & Stats</a></li>
                <li class="nav-item"><a class="nav-link" href="participe.html">Participe</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    
                    <div class="alert alert-info alert-dismissible fade show shadow-sm" role="alert">
                        <strong><i class="fas fa-info-circle mr-2"></i>Aviso Importante:</strong> Inscrições para a próxima leva do fã clube fecham sexta-feira!
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
        
                    <div class="card shadow border-0">
                        <div class="card-header bg-dark text-white text-center py-3">
                            <h3 class="mb-0">Junte-se ao Esquadrão</h3>
                        </div>
                        <div class="card-body p-4">
                            <form>
                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <label for="inputNome">Nome Completo</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                            </div>
                                            <input type="text" class="form-control" id="inputNome" placeholder="Ex: Marcelo David" required>
                                        </div>
                                    </div>
                                    <div class="form-group col-md-6">
                                        <label for="inputEmail">E-mail</label>
                                        <div class="input-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                            </div>
                                            <input type="email" class="form-control" id="inputEmail" placeholder="seu@email.com" required>
                                        </div>
                                    </div>
                                </div>
        
                                <div class="form-group">
                                    <label for="selectPatente">Sua Patente no CS2 / CS:GO</label>
                                    <select id="selectPatente" class="custom-select">
                                        <option selected disabled>Escolha sua patente...</option>
                                        <option value="1">Prata</option>
                                        <option value="2">Ouro</option>
                                        <option value="3">AK / Xerife</option>
                                        <option value="4">Águia / Supremo</option>
                                        <option value="5">Global Elite (Confia)</option>
                                    </select>
                                </div>
        
                                <div class="form-group">
                                    <label for="inputMensagem">Por que o FalleN é o melhor?</label>
                                    <textarea class="form-control" id="inputMensagem" rows="3" placeholder="Deixe sua mensagem de apoio..."></textarea>
                                </div>
        
                                <div class="custom-control custom-checkbox mb-4">
                                    <input type="checkbox" class="custom-control-input" id="checkTermos" required>
                                    <label class="custom-control-label" for="checkTermos">Aceito as regras do fã-clube (Proibido dar rage no matchmaking).</label>
                                </div>
        
                                <button type="submit" class="btn btn-primary btn-lg btn-block">
                                    <i class="fas fa-paper-plane mr-2"></i>Enviar Inscrição
                                </button>
                            </form>
                        </div>
                    </div>
        
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light text-center py-4 mt-5">
        <p class="mb-0">© 2026 Fã Clube Não-Oficial do Gabriel "FalleN" Toledo. <br>
        <small class="text-muted">Feito com Bootstrap 4.6 para fins de estudo.</small></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
